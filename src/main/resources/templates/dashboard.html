<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
	<title>SmartSpend - Dashboard</title>
	<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" />
	<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>
	<div class="container mt-4">
		<h2>Welcome to SmartSpend</h2>
		<p th:text="'Hello, ' + ${username}">Hello User</p>
		<a th:href="@{/transaction}">Add transaction</a> <br>
		<a th:href="@{/transaction/list}">Show transaction</a> <br>
		<a th:href="@{/budget}">Add Budget For month</a><br>
		<a th:href="@{/showBudget}">Show Budget For month</a><br>
		<form th:action="@{/logout}" method="post">
			<button type="submit" class="btn btn-danger">Logout</button>
		</form>
	</div>
	
	<div class="row mt-4">
	    <div class="col-md-4">
	        <div class="card text-white bg-success p-3">
	            <h5>Total Income</h5>
	            <h3 th:text="${summary.income}">0</h3>
	        </div>
	    </div>
	    <div class="col-md-4">
	        <div class="card text-white bg-danger p-3">
	            <h5>Total Expense</h5>
	            <h3 th:text="${summary.expense}">0</h3>
	        </div>
	    </div>
	    <div class="col-md-4">
	        <div class="card text-white bg-primary p-3">
	            <h5>Balance</h5>
	            <h3 th:text="${summary.balance}">0</h3>
	        </div>
	    </div>
	</div>
	<div class="row mt-4">
	    <div class="col-md-6">
	        <h5>Expense by Category</h5>
	        <div style="max-width: 400px; max-height: 400px;">
	            <canvas id="expenseChart"></canvas>
	        </div>
	    </div>
	</div>
</body>
<script th:inline="javascript">
    var categoryData = /*[[${categoryExpense}]]*/ {};
    
    var labels = Object.keys(categoryData);
    var values = Object.values(categoryData);

    new Chart(document.getElementById('expenseChart'), {
        type: 'pie',
        data: {
            labels: labels,
            datasets: [{
                data: values,
                backgroundColor: ['#FF6384', '#36A2EB', '#FFCE56', '#4BC0C0', '#9966FF', '#FF9F40', '#C9CBCF', '#FF6384']
            }]
        }
    });
</script>
</html>
