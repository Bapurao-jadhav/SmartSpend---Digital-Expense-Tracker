<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
	<title>SmartSpend - budget</title>
	<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" />
</head>

<body class="bg-light">




	<h5 class="mt-4">Your existing budgets</h5>
	<table class="table table-bordered">
		<thead>
			<tr>
				<th>Category</th>
				<th>Budget Amount</th>
				<th>Month</th>
				<th>Year</th>
				<th>Action</th>
			</tr>
		</thead>
		<tbody>
			<tr th:each="b : ${budgets}">
				<td th:text="${b.category.name}"></td>
				<td th:text="${b.monthlyBudget}"></td>
				<td th:text="${b.month}"></td>
				<td th:text="${b.year}"></td>
				<td>

				
					<a th:href="@{/budget/delete/{id}(id=${b.id})}" class="btn btn-danger btn-sm"
						onclick="return confirm('Are you sure you want to delete this Budget?')">
						Delete
					</a>

				</td>
			</tr>
		</tbody>
	</table>
</body>

</html>
